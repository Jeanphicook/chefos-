<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Chef OS</title>

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#3A7A48">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chef OS">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Barlow:wght@200;300;400;500&family=Barlow+Condensed:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --green: #6B9E5E;
  --green-dim: rgba(107,158,94,0.15);
  --red: #C05A3A;
  --red-dim: rgba(192,90,58,0.12);
  --blue: #5A8AB0;
  --blue-dim: rgba(90,138,176,0.12);
  --purple: #8A6BAF;
  --bg: #EDF4EE;
  --surface: #E1EDE3;
  --surface2: #D5E6D7;
  --surface3: #C8DECB;
  --border: rgba(20,32,24,0.1);
  --border2: rgba(20,32,24,0.18);
  --text: #142018;
  --text-muted: #4A6050;
  --text-dim: #8AA890;
  --accent: #3A7A48;
  --accent-dim: rgba(58,122,72,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  transition: background 0.6s ease, color 0.4s ease;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1.5rem;
  height: 52px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 200;
}
.brand {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.1rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text);
}
.brand span { color: var(--accent); }
.brand-sub { font-size:0.58rem; letter-spacing:0.3em; color:var(--text-muted); font-weight:300; margin-left:1rem; }
.topbar-right { display:flex; align-items:center; gap:1.5rem; }
.profile-indicator { display:flex; align-items:center; gap:0.5rem; font-size:0.7rem; color:var(--text-muted); }
.profile-dot { width:7px; height:7px; border-radius:50%; background:var(--text-dim); transition:all 0.3s; }
.profile-dot.active { background:var(--green); box-shadow:0 0 6px var(--green); }

.nav-tabs {
  display:flex; border-bottom:1px solid var(--border);
  flex-shrink:0; background:var(--surface);
  position: sticky; top: 52px; z-index: 190;
}
.nav-tab {
  font-family:'Barlow Condensed',sans-serif; font-size:0.72rem;
  letter-spacing:0.2em; text-transform:uppercase; font-weight:500;
  padding:0.75rem 1.5rem; cursor:pointer; color:var(--text-dim);
  border-bottom:2px solid transparent; transition:all 0.15s;
  background:none; border-top:none; border-left:none; border-right:none;
}
.nav-tab:hover { color:var(--text-muted); }
.nav-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab-badge {
  display:inline-flex; align-items:center; justify-content:center;
  min-width:16px; height:16px; border-radius:8px;
  background:var(--accent-dim); color:var(--accent);
  font-size:0.6rem; margin-left:0.4rem; font-weight:600; padding:0 3px;
}

.workspace {
  display: grid;
  grid-template-columns: 280px 1fr 290px;
  flex: 1;
  min-height: 0;
}

.panel { overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--surface3) transparent; }
.panel::-webkit-scrollbar { width:3px; }
.panel::-webkit-scrollbar-thumb { background:var(--surface3); }
.panel-left { border-right:1px solid var(--border); background:var(--surface); }
.panel-center { background:var(--bg); display:flex; flex-direction:column; min-height:600px; }
.panel-right { border-left:1px solid var(--border); background:var(--surface); }

.sec-head {
  padding:0.8rem 1.2rem 0.5rem;
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.58rem; letter-spacing:0.38em; text-transform:uppercase;
  color:var(--text-dim); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; background:var(--surface); z-index:10;
}
.sec-head-btn {
  font-family:'Barlow',sans-serif; font-size:0.58rem;
  background:none; border:1px solid var(--border2);
  color:var(--text-muted); padding:0.15rem 0.5rem; cursor:pointer;
  transition:all 0.12s; letter-spacing:0.05em;
}
.sec-head-btn:hover { color:var(--text); border-color:var(--text-muted); }

.month-grid {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:1px; background:var(--border);
  border-bottom:1px solid var(--border);
}
.m-btn {
  font-family:'Barlow Condensed',sans-serif; font-size:0.65rem;
  letter-spacing:0.08em; text-transform:uppercase;
  background:var(--surface); border:none; color:var(--text-dim);
  padding:0.55rem 0.2rem; cursor:pointer; transition:all 0.12s; text-align:center;
}
.m-btn:hover { color:var(--text-muted); background:var(--surface2); }
.m-btn.active { background:var(--accent); color:var(--bg); font-weight:600; }

.cat-tabs {
  display:flex; gap:1px; background:var(--border);
  border-bottom:1px solid var(--border);
}
.cat-tab {
  flex:1; font-family:'Barlow Condensed',sans-serif;
  font-size:0.6rem; letter-spacing:0.12em; text-transform:uppercase;
  font-weight:500; padding:0.5rem 0.3rem; cursor:pointer;
  color:var(--text-dim); background:var(--surface2); border:none;
  transition:all 0.12s; text-align:center; display:flex;
  flex-direction:column; align-items:center; gap:0.15rem;
}
.cat-tab:hover { color:var(--text-muted); }
.cat-tab.active { background:var(--surface3); color:var(--text); }
.cat-tab.active.legumes { border-top:2px solid var(--green); }
.cat-tab.active.fruits  { border-top:2px solid var(--accent); }
.cat-tab.active.poissons{ border-top:2px solid var(--blue); }
.cat-tab.active.viandes { border-top:2px solid var(--red); }
.cat-icon { font-size:0.8rem; }

.products-area { padding:0.8rem 1rem; }
.prod-list { display:flex; flex-direction:column; gap:0.25rem; }
.prod-item {
  display:flex; align-items:center; gap:0.6rem;
  padding:0.4rem 0.6rem;
  border:1px solid transparent;
  cursor:pointer; transition:all 0.12s; border-radius:2px;
}
.prod-item:hover { background:var(--surface2); border-color:var(--border); }
.prod-item.sel { background:var(--accent-dim); border-color:var(--accent); }
.prod-item.sel.legumes { background:var(--green-dim); border-color:var(--green); }
.prod-item.sel.fruits { background:var(--accent-dim); border-color:var(--accent); }
.prod-item.sel.poissons { background:var(--blue-dim); border-color:var(--blue); }
.prod-item.sel.viandes { background:var(--red-dim); border-color:var(--red); }
.prod-item.pref-high .prod-dot { background:var(--green); }
.prod-item.pref-low { opacity:0.45; }
.prod-dot { width:5px; height:5px; border-radius:50%; background:var(--text-dim); flex-shrink:0; transition:background 0.2s; }
.prod-name { font-size:0.78rem; color:var(--text-muted); flex:1; line-height:1.3; }
.prod-item.sel .prod-name { color:var(--text); }
.prod-score { font-size:0.58rem; color:var(--green); display:none; }
.prod-item.pref-high .prod-score { display:block; }

.sel-summary {
  padding:0.6rem 1rem;
  background:var(--surface2);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  display:flex; flex-wrap:wrap; gap:0.35rem; align-items:center;
  min-height: 36px;
}
.sel-chip {
  font-size:0.62rem; padding:0.15rem 0.5rem;
  background:var(--surface3); border:1px solid var(--border2);
  color:var(--text-muted); display:flex; align-items:center; gap:0.3rem;
}
.sel-chip .rm { cursor:pointer; color:var(--text-dim); font-size:0.7rem; }
.sel-chip .rm:hover { color:var(--red); }
.sel-empty { font-size:0.65rem; color:var(--text-dim); font-style:italic; }

.dna-area { padding:0.8rem 1rem; }
.dna-row { display:flex; align-items:center; gap:0.6rem; margin-bottom:0.45rem; }
.dna-lbl { font-size:0.62rem; color:var(--text-muted); width:76px; flex-shrink:0; }
.dna-track { flex:1; height:2px; background:var(--surface3); position:relative; }
.dna-fill { position:absolute; height:100%; background:var(--accent); transition:width 0.8s ease; }
.dna-val { font-size:0.58rem; color:var(--text-dim); width:22px; text-align:right; }

.input-area {
  padding:1.5rem 2rem 1rem;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.input-row { display:flex; gap:0.8rem; align-items:flex-end; flex-wrap:wrap; }
.input-grp { display:flex; flex-direction:column; gap:0.35rem; }
.i-lbl { font-size:0.57rem; letter-spacing:0.32em; text-transform:uppercase; color:var(--text-dim); }
.chef-input {
  font-family:'Libre Baskerville',serif; font-size:1rem; font-style:italic;
  background:var(--surface2); border:1px solid var(--border2);
  color:var(--text); padding:0.6rem 0.9rem; outline:none;
  transition:border-color 0.15s; width:100%;
}
.chef-input:focus { border-color:var(--accent); }
.chef-input::placeholder { color:var(--text-dim); }
.chef-select {
  font-family:'Barlow',sans-serif; font-size:0.8rem;
  background:var(--surface2); border:1px solid var(--border2);
  color:var(--text-muted); padding:0.6rem 0.8rem;
  outline:none; cursor:pointer; appearance:none; min-width:120px;
}
.go-btn {
  font-family:'Barlow Condensed',sans-serif; font-size:0.75rem;
  letter-spacing:0.25em; text-transform:uppercase; font-weight:600;
  background:var(--accent); color:var(--bg); border:none;
  padding:0.72rem 2rem; cursor:pointer; transition:all 0.15s; white-space:nowrap;
}
.go-btn:hover { background:var(--text); }
.go-btn:disabled { opacity:0.3; cursor:not-allowed; }

.style-hint { margin-top:0.5rem; font-size:0.65rem; color:var(--green); display:none; }
.style-hint.vis { display:block; }

/* ── TEMPORALITÉ TOGGLE ── */
.tempo-toggle {
  display:flex; align-items:center; gap:0.4rem;
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.62rem; letter-spacing:0.15em; text-transform:uppercase;
}
.tempo-btn {
  padding:0.25rem 0.7rem; border:1px solid var(--border2);
  background:none; color:var(--text-dim); cursor:pointer;
  font-family:'Barlow Condensed',sans-serif; font-size:0.6rem;
  letter-spacing:0.15em; text-transform:uppercase; transition:all 0.12s;
}
.tempo-btn:hover { color:var(--text-muted); border-color:var(--text-muted); }
.tempo-btn.active { background:var(--accent); color:var(--bg); border-color:var(--accent); font-weight:600; }
.tempo-label { font-size:0.57rem; color:var(--text-dim); letter-spacing:0.2em; }
.style-hint.vis { display:block; }

.loading {
  display:none; align-items:center; gap:1.2rem;
  padding:2rem 2rem 0; flex-shrink:0;
}
.loading.vis { display:flex; }
.ld-bar { width:80px; height:1px; background:var(--surface3); position:relative; overflow:hidden; }
.ld-bar::after {
  content:''; position:absolute; height:1px; width:35%;
  background:var(--accent); animation:ld 1.2s ease-in-out infinite;
}
@keyframes ld { 0%{left:-35%} 100%{left:135%} }
.ld-txt { font-size:0.7rem; color:var(--text-dim); letter-spacing:0.15em; }

.results-scroll { flex:1; overflow-y:auto; padding:1.5rem 2rem; scrollbar-width:thin; scrollbar-color:var(--surface3) transparent; }

.empty-center {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; min-height:300px; gap:0.8rem; text-align:center;
}
.empty-big {
  font-family:'Libre Baskerville',serif; font-size:4rem;
  font-weight:400; font-style:italic; color:var(--surface3); line-height:1;
}
.empty-sub { font-size:0.68rem; color:var(--text-dim); letter-spacing:0.2em; text-transform:uppercase; line-height:1.9; }

.result-card { animation:fadeUp 0.3s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

.card-nom {
  font-family:'Libre Baskerville',serif; font-size:2rem;
  font-weight:400; font-style:italic; color:var(--text); line-height:1.1; margin-bottom:0.4rem;
}
.card-meta { display:flex; gap:0.6rem; flex-wrap:wrap; align-items:center; margin-bottom:1.2rem; padding-bottom:1rem; border-bottom:1px solid var(--border); }
.ctag { font-size:0.58rem; letter-spacing:0.2em; text-transform:uppercase; padding:0.2rem 0.7rem; border:1px solid; }
.ctag.type { border-color:var(--blue); color:var(--blue); }
.ctag.prod { border-color:var(--accent); color:var(--accent); }
.ctag.adapted { border-color:var(--green); color:var(--green); background:var(--green-dim); }

.blocs { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); border:1px solid var(--border); margin-bottom:0.8rem; }
.blocs.single { grid-template-columns:1fr; }
.blocs.four { grid-template-columns:repeat(4,1fr); }
.bloc { background:var(--surface2); padding:0.9rem 1rem; }
.bloc-lbl { font-size:0.55rem; letter-spacing:0.35em; text-transform:uppercase; color:var(--text-dim); margin-bottom:0.4rem; }
.bloc-val { font-size:0.82rem; line-height:1.72; color:var(--text); font-weight:300; }
.bloc-val.acc { color:var(--accent); }
.bloc-val.warn .vi { display:flex; gap:0.5rem; margin-bottom:0.25rem; font-size:0.8rem; }
.bloc-val.warn .vi::before { content:'↗'; color:var(--red); flex-shrink:0; }

.action-bar { display:flex; gap:0.5rem; margin-top:1rem; flex-wrap:wrap; }
.act { font-family:'Barlow',sans-serif; font-size:0.63rem; letter-spacing:0.12em; text-transform:uppercase; font-weight:500; padding:0.45rem 1rem; border:1px solid; cursor:pointer; transition:all 0.12s; background:none; }
.act.save { border-color:var(--green); color:var(--green); }
.act.save:hover { background:var(--green-dim); }
.act.regen { border-color:var(--accent); color:var(--accent); }
.act.regen:hover { background:var(--accent-dim); }
.act.reject { border-color:var(--text-dim); color:var(--text-dim); }
.act.reject:hover { border-color:var(--red); color:var(--red); }
.act:disabled { opacity:0.3; cursor:not-allowed; }

.saved-item {
  padding:0.6rem 1.2rem; border-bottom:1px solid var(--border);
  cursor:pointer; transition:background 0.12s;
  display:flex; align-items:flex-start; gap:0.5rem;
}
.saved-item:hover { background:var(--surface2); }
.saved-nom { font-family:'Libre Baskerville',serif; font-size:0.82rem; font-style:italic; color:var(--text); margin-bottom:0.15rem; }
.saved-meta { font-size:0.6rem; color:var(--text-dim); display:flex; gap:0.5rem; }
.saved-empty { padding:1.5rem 1.2rem; font-size:0.7rem; color:var(--text-dim); font-style:italic; text-align:center; }
.del-btn { background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:0.9rem; padding:0 0.2rem; transition:color 0.12s; flex-shrink:0; }
.del-btn:hover { color:var(--red); }

.mem-item { display:flex; gap:0.5rem; padding:0.4rem 1.2rem; border-bottom:1px solid var(--border); }
.mem-icon { color:var(--accent); flex-shrink:0; font-size:0.7rem; margin-top:1px; }
.mem-txt { font-size:0.67rem; color:var(--text-muted); line-height:1.45; flex:1; }
.mem-ts { font-size:0.57rem; color:var(--text-dim); flex-shrink:0; }

#ws-profil { display:none; padding:2rem; overflow-y:auto; }
#ws-catalogue { display:none; padding:0; overflow-y:auto; }

.cat-header {
  padding:1.5rem 2rem; border-bottom:1px solid var(--border);
  background:var(--surface); position:sticky; top:0; z-index:10;
}
.cat-title { font-family:'Libre Baskerville',serif; font-size:1.8rem; font-style:italic; font-weight:400; margin-bottom:0.5rem; }
.cat-nav { display:flex; gap:0.4rem; flex-wrap:wrap; }
.cat-nav-btn {
  font-family:'Barlow Condensed',sans-serif; font-size:0.65rem;
  letter-spacing:0.15em; text-transform:uppercase; padding:0.3rem 0.8rem;
  background:none; border:1px solid var(--border2); color:var(--text-dim);
  cursor:pointer; transition:all 0.12s;
}
.cat-nav-btn:hover { color:var(--text); border-color:var(--text-muted); }
.cat-nav-btn.active { background:var(--accent); color:var(--bg); border-color:var(--accent); font-weight:600; }

.cat-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));
  gap:1px; background:var(--border); padding:0;
}
.cat-month-card { background:var(--surface2); padding:1.5rem; }
.cat-month-name {
  font-family:'Libre Baskerville',serif; font-size:1.3rem;
  font-style:italic; color:var(--text); margin-bottom:1rem;
  padding-bottom:0.6rem; border-bottom:1px solid var(--border);
  display:flex; align-items:baseline; justify-content:space-between;
}
.cat-season { font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-dim); font-style:normal; font-family:'Barlow',sans-serif; }
.cat-section { margin-bottom:0.8rem; }
.cat-sec-lbl { font-size:0.57rem; letter-spacing:0.3em; text-transform:uppercase; margin-bottom:0.35rem; }
.cat-sec-lbl.l { color:var(--green); }
.cat-sec-lbl.f { color:var(--accent); }
.cat-sec-lbl.p { color:var(--blue); }
.cat-sec-lbl.v { color:var(--red); }
.cat-items { display:flex; flex-wrap:wrap; gap:0.3rem; }
.cat-item {
  font-size:0.67rem; padding:0.18rem 0.5rem;
  background:var(--surface3); border:1px solid var(--border);
  color:var(--text-muted); cursor:pointer; transition:all 0.12s;
}
.cat-item:hover { color:var(--text); border-color:var(--text-muted); }
.cat-item.l:hover { border-color:var(--green); color:var(--green); }
.cat-item.f:hover { border-color:var(--accent); color:var(--accent); }
.cat-item.p:hover { border-color:var(--blue); color:var(--blue); }
.cat-item.v:hover { border-color:var(--red); color:var(--red); }

/* ── ÉDITEUR PAIRINGS ── */
#ws-editor { display:none; padding:0; overflow-y:auto; }
.editor-header {
  padding:1.5rem 2rem; border-bottom:1px solid var(--border);
  background:var(--surface); position:sticky; top:0; z-index:10;
  display:flex; align-items:baseline; justify-content:space-between;
}
.editor-title { font-family:'Libre Baskerville',serif; font-size:1.8rem; font-style:italic; font-weight:400; }
.editor-subtitle { font-size:0.65rem; color:var(--text-dim); letter-spacing:0.2em; text-transform:uppercase; }

.editor-body { padding:1.5rem 2rem; max-width:900px; }

.prod-selector {
  display:flex; flex-wrap:wrap; gap:0.4rem; margin-bottom:1.5rem;
  padding:1rem; background:var(--surface2); border:1px solid var(--border);
}
.ps-btn {
  font-size:0.68rem; padding:0.25rem 0.7rem;
  border:1px solid var(--border2); background:var(--surface3);
  color:var(--text-muted); cursor:pointer; transition:all 0.12s;
  font-family:'Barlow',sans-serif;
}
.ps-btn:hover { border-color:var(--text-muted); color:var(--text); }
.ps-btn.active { background:var(--accent); color:var(--bg); border-color:var(--accent); }
.ps-btn.has-data { border-color:var(--green); color:var(--green); }
.ps-btn.has-data.active { background:var(--green); color:var(--bg); }

.editor-form {
  background:var(--surface2); border:1px solid var(--border);
  padding:1.5rem; animation:fadeUp 0.2s ease;
}
.ef-prod-name {
  font-family:'Libre Baskerville',serif; font-size:1.4rem;
  font-style:italic; margin-bottom:1.2rem; color:var(--text);
  padding-bottom:0.8rem; border-bottom:1px solid var(--border);
  display:flex; align-items:baseline; gap:1rem;
}
.ef-prod-badge {
  font-size:0.58rem; letter-spacing:0.2em; text-transform:uppercase;
  padding:0.2rem 0.6rem; border:1px solid var(--border2);
  color:var(--text-dim); font-family:'Barlow',sans-serif; font-style:normal;
}

.ef-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem; }
.ef-field { display:flex; flex-direction:column; gap:0.4rem; }
.ef-field.full { grid-column:1/-1; }
.ef-lbl {
  font-size:0.55rem; letter-spacing:0.35em; text-transform:uppercase;
  color:var(--text-dim); display:flex; align-items:center; gap:0.5rem;
}
.ef-lbl-color { width:8px; height:2px; display:inline-block; }
